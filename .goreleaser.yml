# goreleaser configuration for outpost.
#
# Produces multi-arch archives for all tier-1 + tier-2 targets,
# plus SHA256 checksums, cosign signatures, and SBOMs.
#
# OS binaries are unsigned (no Apple Developer / Authenticode certs);
# cosign + SHA256 + GitHub Attestations cover supply-chain trust.
#
# Validate locally with: goreleaser check
# Dry run with:          goreleaser release --snapshot --clean
version: 2

project_name: outpost

before:
  hooks:
    - go mod tidy
    - go mod download

builds:
  - id: outpost
    main: ./cmd/outpost
    binary: outpost
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
      - freebsd
      - openbsd
    goarch:
      - amd64
      - arm64
    ignore:
      # Tier-2 OSes are amd64-only per DESIGN §7.
      - goos: freebsd
        goarch: arm64
      - goos: openbsd
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.binaryVersion={{ .Version }}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md
      - AGENTS.md
      - CHANGELOG.md
      - docs/**/*
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - id: default
    artifacts: archive

signs:
  - id: cosign-checksums
    cmd: cosign
    artifacts: checksum
    certificate: "${artifact}.pem"
    signature: "${artifact}.sig"
    args:
      - sign-blob
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"

release:
  github:
    owner: Tim-Butterfield
    name: outpost
  draft: false
  prerelease: auto
  header: |
    ## outpost {{ .Tag }}

    File-RPC bridge for remote AI execution. See
    https://github.com/Tim-Butterfield/outpost for documentation.
  footer: |
    Binaries are unsigned at the OS level. Supply-chain
    trust is via cosign signatures on the checksums file plus
    GitHub Attestations. Verify with:

    ```
    cosign verify-blob \
      --certificate checksums.txt.pem \
      --signature   checksums.txt.sig \
      --certificate-identity-regexp \
        'https://github.com/Tim-Butterfield/outpost' \
      --certificate-oidc-issuer \
        https://token.actions.githubusercontent.com \
      checksums.txt
    ```

    macOS Gatekeeper / Windows SmartScreen workarounds are
    documented in the README under "Installation".

