# Continuous integration for outpost.
#
# Native runners cover five of the six tier-1 targets per
# docs/DESIGN.md §7. darwin/amd64 is cross-compiled in the tier2-build
# job because the GitHub-hosted macos-13 runner pool is deprecated and
# effectively unavailable as of 2026; native amd64 darwin validation
# is done locally via Rosetta on Apple Silicon hosts before each
# release.
# Tier-2 (FreeBSD / OpenBSD amd64) gets a cross-compile build-only
# check.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  GO_VERSION: "1.26"

jobs:
  test:
    name: Test ${{ matrix.os }} (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Tier 1: native runners. race_flag is "-race" where Go's
          # race detector is supported, empty otherwise.
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            race_flag: "-race"
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            race_flag: "-race"
          - os: macos-latest
            goos: darwin
            goarch: arm64
            race_flag: "-race"
          - os: windows-latest
            goos: windows
            goarch: amd64
            race_flag: "-race"
          - os: windows-11-arm
            goos: windows
            goarch: arm64
            race_flag: "" # race detector not supported on windows/arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test ${{ matrix.race_flag }}
        run: go test ${{ matrix.race_flag }} -timeout 5m ./...

  tier2-build:
    name: Cross-compile ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # darwin/amd64 is tier-1 by support status but build-only in
          # CI: see header comment.
          - goos: darwin
            goarch: amd64
          - goos: freebsd
            goarch: amd64
          - goos: openbsd
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: go build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

  coverage:
    name: Coverage report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: true
      - name: Test with coverage
        run: |
          go test -race -timeout 5m -coverprofile=coverage.out \
            -covermode=atomic \
            ./internal/... ./pkg/outpost/...
          go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
